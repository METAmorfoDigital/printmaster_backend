spring:
  application:
    name: printmaster-erp

  datasource:
    url: jdbc:mysql://localhost:3306/printmaster_erp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/La_Paz
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/La_Paz
    open-in-view: false

  jackson:
    time-zone: America/La_Paz

server:
  port: 8080

# ✅ JWT config
jwt:
  secret: ${JWT_SECRET:PrintMasterSecretKeyMuySeguraYLarga2024!}
  expiration: ${JWT_EXPIRATION:86400000} 

  logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE